<div class="login-form-container">
  <h2>Login</h2>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" type="text" formControlName="username" />
      <div
        class="validation-error"
        *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
      >
        Username is required and should not contain special characters.
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" />
      <div
        class="validation-error"
        *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
      >
        Password must be at least 8 characters and contain one capital letter and one number.
      </div>
    </div>

    <div class="button-group">
      <button type="submit">Login</button>
    </div>
  </form>

  <div class="register-link">
    <p>
      Not registered yet?
      <a routerLink="/auth/registration">Create an account</a>
    </p>
  </div>

  <div class="success-message" *ngIf="successMessage">
    {{ successMessage }}
  </div>

  <div class="error-message" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>
</div>
