<div class="registration-form-container">
  <h2>Registration</h2>

  <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="fullName">Full Name</label>
      <input id="fullName" type="text" formControlName="fullName" />
      <div class="validation-error" *ngIf="registrationForm.get('fullName')?.invalid && registrationForm.get('fullName')?.touched">
        Full Name is required.
      </div>
    </div>

    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" type="text" formControlName="username" />
      <div class="validation-error" *ngIf="registrationForm.get('username')?.invalid && registrationForm.get('username')?.touched">
        Username is required and should not contain special characters.
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" />
      <div class="validation-error" *ngIf="registrationForm.get('email')?.invalid && registrationForm.get('email')?.touched">
        Please enter a valid email address.
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" />
      <div class="validation-error" *ngIf="registrationForm.get('password')?.invalid && registrationForm.get('password')?.touched">
        Password must be at least 8 characters and contain one capital letter and one number.
      </div>
    </div>

    <div class="button-group">
      <button type="submit">Register</button>
      <button type="button" (click)="resetForm()">Reset</button>
    </div>
  </form>

  <div class="success-message" *ngIf="successMessage">
    {{ successMessage }}
  </div>

  <div class="error-message" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>
</div>
