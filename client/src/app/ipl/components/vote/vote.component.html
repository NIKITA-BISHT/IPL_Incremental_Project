<div class="vote-form-container">
  <h2>Submit Vote</h2>

  <form [formGroup]="voteForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" />
    </div>

    <div class="form-group">
      <label for="category">Category</label>
      <select id="category" formControlName="category">
        <option value="">Select Category</option>
        <option value="Team">Team</option>
        <option value="Batsman">Batsman</option>
        <option value="Bowler">Bowler</option>
        <option value="All-rounder">All-rounder</option>
        <option value="Wicketkeeper">Wicketkeeper</option>
      </select>
    </div>

    <div class="form-group">
      <label for="teamId">Team</label>
      <select id="teamId" formControlName="teamId">
        <option value="">Select Team</option>
        <option *ngFor="let team of teams" [value]="team.teamId">
          {{ team.teamName }}
        </option>
      </select>
    </div>

    <div class="form-group">
      <label for="cricketerId">Cricketer</label>
      <select id="cricketerId" formControlName="cricketerId">
        <option value="">Select Cricketer</option>
        <option *ngFor="let cricketer of cricketers" [value]="cricketer.cricketerId">
          {{ cricketer.cricketerName }}
        </option>
      </select>
    </div>

    <div class="button-group">
      <button type="submit">Submit Vote</button>
      <button type="button" (click)="resetForm()">Reset</button>
      <a routerLink="/ipl/dashboard">Dashboard</a>
    </div>
  </form>

  <div class="success-message" *ngIf="successMessage">
    {{ successMessage }}
  </div>

  <div class="error-message" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>
</div>
