<div class="ticketbooking-form-container">
  <h2>Book Tickets</h2>

  <form [formGroup]="ticketBookingForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" />
    </div>

    <div class="form-group">
      <label for="matchId">Scheduled Match</label>
      <select id="matchId" formControlName="matchId">
        <option value="">Select Match</option>
        <option *ngFor="let match of matches" [value]="match.matchId">
          {{ match.matchId }} - {{ match.venue }} - {{ match.matchDate | date }}
        </option>
      </select>
    </div>

    <div class="form-group">
      <label for="numberOfTickets">Number Of Tickets</label>
      <input
        id="numberOfTickets"
        type="number"
        formControlName="numberOfTickets"
      />
    </div>

    <div class="button-group">
      <button type="submit">Book Tickets</button>
      <button type="button" (click)="resetForm()">Reset</button>
      <a routerLink="/ipl/dashboard">Dashboard</a>
    </div>
  </form>

  <div class="success-message" *ngIf="successMessage">
    {{ successMessage }}
  </div>

  <div class="error-message" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>
</div>
