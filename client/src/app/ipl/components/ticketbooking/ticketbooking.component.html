<div class="form-container">
  <h2>Book Tickets</h2>

  <form [formGroup]="ticketBookingForm" (ngSubmit)="onSubmit()">

    <div class="form-group">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        placeholder="Enter email"
      />

      <small
        class="error-text"
        *ngIf="ticketBookingForm.get('email')?.invalid && ticketBookingForm.get('email')?.touched"
      >
        Please enter a valid email.
      </small>
    </div>

    <div class="form-group">
      <label for="matchId">Scheduled Match</label>
      <select id="matchId" formControlName="matchId">
        <option value="">Select Match</option>
        <option *ngFor="let match of matches" [value]="match.matchId">
          {{ match.matchId }} - {{ match.venue }} - {{ match.matchDate | date }}
        </option>
      </select>

      <small
        class="error-text"
        *ngIf="ticketBookingForm.get('matchId')?.invalid && ticketBookingForm.get('matchId')?.touched"
      >
        Please select a match.
      </small>
    </div>

    <div class="form-group">
      <label for="numberOfTickets">Number Of Tickets</label>
      <input
        id="numberOfTickets"
        type="number"
        formControlName="numberOfTickets"
        placeholder="Enter number of tickets"
      />

      <small
        class="error-text"
        *ngIf="ticketBookingForm.get('numberOfTickets')?.invalid && ticketBookingForm.get('numberOfTickets')?.touched"
      >
        Number of tickets must be at least 1.
      </small>
    </div>

    <div class="button-group">
      <button type="submit">Book Tickets</button>
      <button type="button" class="reset-btn" (click)="resetForm()">Reset</button>
      <a routerLink="/ipl/dashboard">Dashboard</a>
    </div>

  </form>

  <p class="success-message" *ngIf="successMessage">
    {{ successMessage }}
  </p>

  <p class="error-message" *ngIf="errorMessage">
    {{ errorMessage }}
  </p>
</div>
