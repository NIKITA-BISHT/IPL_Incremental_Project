<div class="form-container">
  <h2>Create Cricketer</h2>

  <form [formGroup]="cricketerForm" (ngSubmit)="onSubmit()">

    <div class="form-group">
      <label for="cricketerId">Cricketer ID</label>
      <input
        id="cricketerId"
        type="number"
        formControlName="cricketerId"
        placeholder="Enter cricketer ID"
      />
    </div>

    <div class="form-group">
      <label for="teamId">Team</label>
      <select id="teamId" formControlName="teamId">
        <option value="">Select Team</option>
        <option *ngFor="let team of teams" [value]="team.teamId">
          {{ team.teamName }}
        </option>
      </select>
    </div>

    <div class="form-group">
      <label for="cricketerName">Cricketer Name</label>
      <input
        id="cricketerName"
        type="text"
        formControlName="cricketerName"
        placeholder="Enter cricketer name"
      />

      <small
        class="error-text"
        *ngIf="cricketerForm.get('cricketerName')?.invalid && cricketerForm.get('cricketerName')?.touched"
      >
        Cricketer Name is required and should not contain special characters.
      </small>
    </div>

    <div class="form-group">
      <label for="age">Age</label>
      <input
        id="age"
        type="number"
        formControlName="age"
        placeholder="Enter age"
      />
    </div>

    <div class="form-group">
      <label for="nationality">Nationality</label>
      <input
        id="nationality"
        type="text"
        formControlName="nationality"
        placeholder="Enter nationality"
      />
    </div>

    <div class="form-group">
      <label for="experience">Experience</label>
      <input
        id="experience"
        type="number"
        formControlName="experience"
        placeholder="Enter experience"
      />

      <small
        class="error-text"
        *ngIf="cricketerForm.get('experience')?.invalid && cricketerForm.get('experience')?.touched"
      >
        Experience must be non-negative.
      </small>
    </div>

    <div class="form-group">
      <label for="role">Role</label>
      <input
        id="role"
        type="text"
        formControlName="role"
        placeholder="Enter role"
      />
    </div>

    <div class="form-group">
      <label for="totalRuns">Total Runs</label>
      <input
        id="totalRuns"
        type="number"
        formControlName="totalRuns"
        placeholder="Enter total runs"
      />
    </div>

    <div class="form-group">
      <label for="totalWickets">Total Wickets</label>
      <input
        id="totalWickets"
        type="number"
        formControlName="totalWickets"
        placeholder="Enter total wickets"
      />
    </div>

    <div class="button-group">
      <button type="submit">Submit</button>
      <button type="button" class="reset-btn" (click)="resetForm()">Reset</button>
      <a routerLink="/ipl/dashboard">Dashboard</a>
    </div>

  </form>

  <p class="success-message" *ngIf="successMessage">
    {{ successMessage }}
  </p>

  <p class="error-message" *ngIf="errorMessage">
    {{ errorMessage }}
  </p>
</div>
